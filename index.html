<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebAR — Phase 3 (Career Menu)</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- LOADING -->
  <div id="loading-screen" aria-hidden="false">
    <div class="bar-wrap"><div id="bar" class="bar"></div></div>
    <div id="loading-text">กำลังโหลดทรัพยากร... 0%</div>
    <div id="version" aria-hidden="true" style="margin-top:8px;color:#9ca3af">v1.0.ภ</div>
    <button id="startButton">แตะเพื่อเริ่ม AR</button>
  </div>

  <!-- AR canvas container -->
  <div id="container"></div>

  <!-- scan overlay -->
  <div id="scan-frame">
    <div class="frame"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div></div>
  </div>

  <!-- Career menu (centered vertical) -->
  <div id="career-menu">
    <h2>เลือกอาชีพ</h2>
    <div class="career-list">
      <button class="career-btn" data-career="AI">AI</button>
      <button class="career-btn" data-career="Cloud">Cloud</button>
      <button class="career-btn" data-career="Data_Center">Data Center</button>
      <button class="career-btn" data-career="Network">Network</button>
    </div>

    <!-- action buttons appear when a non-Computer career is active -->
    <div id="career-actions">
      <button id="game-btn" class="action-btn">🎮 Memory Match Game</button>
      <button id="survey-btn" class="action-btn">📝 แบบสำรวจ (Google Form)</button>
      <button id="contact-btn" class="action-btn">📞 หากสนใจติดต่อ</button>
    </div>

    <div id="return-row">
      <button id="return-btn">กลับไปเล่นคอนเทนต์เดิม</button>
    </div>
  </div>

  <button id="backBtn">← ย้อนกลับ</button>

  <script type="module" src="js/main.js"></script>
</body>
</html>
